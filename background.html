<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10">
    <div id="colorBox" class="w-40 h-40 rounded-2xl bg-gray-300"></div>

    <script>
      // YOUR CODE HERE
      // 1. Select the div by id
      // 2. Remove "bg-gray-300" from its classList
      // 3. Add "bg-blue-500" to its classList

      const box = document.querySelector("#colorBox");
      box.classList.remove("bg-gray-300");
      box.classList.add("bg-blue-500");
    </script>
  </body>
</html>
